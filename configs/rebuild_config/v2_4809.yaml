# ===================================================================
# 数据清洗与增强流水线 V2 配置文件（完全适配重构后代码）
# ===================================================================

task_name: "v2_4809"                # 任务名称，会作为中间目录名
resume: true                        # 断点续跑

executor:
  type: sequential                  # 当前仅支持 sequential
  max_workers: 4

paths:
  input:
    raw_dialogues_dir: "./datas/Yangqg_simulation_data"   # 原始对话 .doc/.docx
    prompt_dir: "./datas/cases_random"                    # prompt .txt
  intermediate: "./intermediate"    # 所有中间产物根目录
  output: "./output"                # 最终输出（预留）

logging:
  level: INFO
  file_level: DEBUG
  show_progress: true
  print_tree: true

reporting:
  enabled: true
  reporters:
    - type: json
      output_dir: "{task_dir}/reports/"
    - type: csv
      output_dir: "{task_dir}/reports/"
    - type: matplotlib
      output_dir: "{task_dir}/reports/plots/"
      dpi: 150

# 步骤执行顺序（可调整）
steps_order:
  - "00_generate_raw"
  - "01_split"
  - "02_bucket"
  - "03_clean"
  - "04_finalize"
  - "05_augment"
  - "06_replace_text"

steps:
  # ================================================================
  # 00_generate_raw：从 doc/docx 生成原始 JSON
  # 若您已有 raw_dialogues.json，可禁用本步骤
  # ================================================================
  00_generate_raw:
    enabled: false                     # 设置为 false 则跳过
    raw_dir: "{paths.input.raw_dialogues_dir}"   # 实际会被 paths.input 覆盖，可不写
    prompt_dir: "{paths.input.prompt_dir}"
    output_file: "{task_dir}/raw_dialogues.json"

  # ================================================================
  # 01_split：拆分为样本 JSONL
  # 如果 00 被禁用，请显式指定 input_json 指向现有 raw_dialogues.json
  # ================================================================
  01_split:
    enabled: true
    input_json: "{task_dir}/raw_dialogues.json"   # 若禁用00，改为实际路径，如 "./data/raw_dialogues.json"
    output_dir: "{task_dir}/samples"
    stats_dir: "{task_dir}/stats"
    batch_size: 120000

  # ================================================================
  # 02_bucket：按轮次分桶（支持 manual / percentile / equal_count）
  # ================================================================
  02_bucket:
    enabled: false
    samples_dir: "{task_dir}/samples"
    output_base: "{task_dir}/bucketed"
    strategy: manual                     # 可选: manual, percentile, equal_count, auto
    # ----- manual 模式（手动指定桶边界）-----
    manual_buckets:
      - [0, 0]      # turn=0
      - [1, 1]      # turn=1
      - [2, 2]      # turn=2
      - [3, 5]      # turn=3~5
      - [6, 999]    # turn >=6
    # ----- 自动模式示例（注释掉 manual_buckets，取消下面注释）-----
    # auto_params:
    #   percentiles: [0, 25, 50, 75, 90, 95, 100]   # percentile 模式
    #   # 或
    #   min_bucket_size: 1000                       # equal_count 模式

  # ================================================================
  # 03_clean：调用 Data-Juicer 清洗
  # ================================================================
  03_clean:
    enabled: trufalsee
    bucketed_root: "{task_dir}/bucketed"
    cleaned_root: "{task_dir}/cleaned_jsonl"
    trace_root: "{task_dir}/trace_output"
    configs_dir: "configs/configs_qa"               # 清洗配置目录
    bucket_config_map:
      - pattern: "bucket_0_.*"
        config: "config_light.yaml"
      - pattern: "bucket_.*"
        config: "config_heavy.yaml"
    attach_analyzers:
      - "RetentionAnalyzer"
      - "TurnDistributionAnalyzer"

  # ================================================================
  # 04_finalize：应用 loss 标记
  # ================================================================
  04_finalize:
    enabled: false
    original_json: "{task_dir}/raw_dialogues.json"
    cleaned_root: "{task_dir}/cleaned_jsonl"
    output_root: "{task_dir}/final_training_data"
    # source_run_id: 可指定具体清洗 run_id，留空则自动取最新

  # ================================================================
  # 05_augment：语义增强
  # ================================================================
  05_augment:
    enabled: false
    # 输入数据（三选一，优先级：input_file > source_run_id > 自动查找最新 _final）
    source_run_id: null                # 例如 "20250624_120000_clean_default_final"
    input_file: null                   # 例如 "{task_dir}/final_training_data/latest_final/cleaned_training_data.json"
    # 若都不填，自动查找 final_training_data 下最新的 _final 目录

    output_dir: "{task_dir}/output_augmented_data"
    num_variants: 3
    target_roles: ["user"]
    only_loss_true: true
    adaptive_variants: false
    message_augment_prob: 0.8
    seed: 42
    tag: "default"

    augment_weights:
      synonym_replace: 1.0
      asr_noise: 0.0                     # 若未安装 bert4keras/tensorflow，设为 0
      back_translation: 0.0

    # ASR 缓存（若 asr_noise=0 则不会被使用，可删除此段）
    asr_cache:
      vectors_path: "cache/vectors.pkl"
      pinyin_path: "cache/pinyin.pkl"
      prev_map_path: "cache/prev_to_abnormals.pkl"
      model_path: "models/asr_model"

  # ================================================================
  # 06_replace_text：文本替换 + loss 类型转换
  # ================================================================
  06_replace_text:
    enabled: false
    input_file: null                   # 留空则自动查找最新的 combined_augmented_*.json
    output_file: null                  # 自动生成
    suffix: "_replaced"