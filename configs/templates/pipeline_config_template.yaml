# ==============================================================================
# 数据清洗与语义增强流水线配置文件模板（Pipeline V2）
# ==============================================================================
# 适用版本：重构后的 pipeline 包（pipeline/core/pipeline.py）
# 路径解析规则：
#   - 绝对路径（以 / 开头）：直接使用
#   - 含 {task_dir}：替换为 intermediate/{task_name}/
#   - 相对路径：视为相对于项目根目录（run_pipeline.py 所在目录）
#
# 使用方法：复制此文件，修改 task_name 和各步骤配置后运行：
#   python run_pipeline.py --config configs/pipeline/templates/your_config.yaml
#   python run_pipeline.py --config configs/pipeline/templates/your_config.yaml --step 05_augment
# ==============================================================================


# ------------------- 基础任务信息 -------------------
# 必填项：task_name（每个任务必须唯一）
task_name: "my_task"              # 任务名称，会作为 intermediate 下的子目录名
resume: false                     # 断点续跑（true=跳过已完成步骤）


# ------------------- 执行器配置 -------------------
# 全局并行控制，各步骤可单独覆盖 max_workers
executor:
  max_workers: 1                  # 全局默认并行数（步骤内并行）


# ------------------- 路径管理 -------------------
paths:
  input:
    raw_dialogues_dir: null       # 原始对话目录（.doc/.docx，用于 00_generate_raw）
    prompt_dir: null              # 提示文件目录（case_*.txt，用于 00_generate_raw）
  intermediate: "intermediate"    # 所有中间产物的根目录（task_dir = intermediate/task_name）
  output: "output"                # 最终输出（预留）

# 输出文件命名规范：
#   {task_name}_{step_id}_{description}[_{extra}]_{timestamp}.{ext}


# ------------------- 日志与进度 -------------------
logging:
  level: "INFO"                   # 控制台日志级别：DEBUG | INFO | WARNING | ERROR
  file_level: "DEBUG"             # 文件日志级别（更详细）
  show_progress: true             # 是否显示 tqdm 进度条


# ------------------- 报告与分析模块 -------------------
# 清洗步骤完成后自动触发分析和报告生成
reporting:
  enabled: true                   # 是否启用报告生成
  reporters:                      # 报告器列表（可插拔）
    - type: json                  # JSON 报告器
      output_dir: "{task_dir}/reports/"
    - type: csv                   # CSV 报告器
      output_dir: "{task_dir}/reports/"
    - type: matplotlib            # 图表报告器（需要 matplotlib）
      output_dir: "{task_dir}/reports/plots/"
      dpi: 150


# ------------------- 步骤执行顺序 -------------------
# 可按需调整顺序，但需注意依赖关系：
#   00_generate_raw -> 01_split -> 02_bucket -> 03_clean -> 04_finalize -> 05_augment -> 06_replace_text
# 未列出的步骤不会执行
steps_order:
  - "00_generate_raw"
  - "01_split"
  - "02_bucket"
  - "03_clean"
  - "04_finalize"
  - "05_augment"
  - "06_replace_text"


# ------------------- 各步骤详细配置 -------------------
steps:

  # ================================================================
  # 步骤00：生成原始对话 JSON（从 doc/docx + prompt）
  # 将 .doc/.docx 文件和 case_*.txt 提示文件转换为标准化对话 JSON
  # ================================================================
  00_generate_raw:
    enabled: false                # 是否启用（已有 raw_dialogues.json 可设为 false）
    raw_dir: null                 # 原始对话目录（覆盖 paths.input.raw_dialogues_dir）
    prompt_dir: null              # 提示文件目录（覆盖 paths.input.prompt_dir）
    output_file: "{task_dir}/raw_dialogues.json"  # 输出文件路径


  # ================================================================
  # 步骤01：拆分为单轮样本
  # 将完整多轮对话拆分为单轮样本（每条包含历史上下文）
  # ================================================================
  01_split:
    enabled: false                # 是否启用
    input_json: null              # 输入 JSON 文件（原始对话），必填
    output_dir: "{task_dir}/samples"          # 样本输出目录
    stats_dir: "{task_dir}/stats"            # 统计输出目录
    batch_size: 120000            # 每个 JSONL 文件最大行数


  # ================================================================
  # 步骤02：按轮次分桶
  # 支持三种策略：manual（手动）、percentile（百分位）、equal_count（等数量）
  # ================================================================
  02_bucket:
    enabled: false                # 是否启用
    samples_dir: "{task_dir}/samples"       # 输入样本目录
    output_base: "{task_dir}/bucketed"     # 输出桶根目录
    strategy: "manual"            # 分桶策略：manual | percentile | equal_count

    # ----- 手动模式配置（strategy=manual 时使用）-----
    # 每个桶定义为 [min_turn, max_turn]
    # max_turn >= 9999 视为无上限，桶名格式为 bucket_{min_turn}_plus
    manual_buckets:
      - [0, 0]                    # bucket_0（单轮对话）
      - [1, 1]                    # bucket_1
      - [2, 2]                    # bucket_2
      - [3, 5]                    # bucket_3_5（4-6轮对话）
      - [6, 10]                   # bucket_6_10（7-11轮对话）
      - [11, 20]                  # bucket_11_20（12-21轮对话）
      - [21, 9999]                # bucket_21_plus（长对话）

    # ----- 自动模式配置（strategy=percentile 或 equal_count 时使用）-----
    auto_params:
      percentiles: [0, 25, 50, 75, 90, 95, 100]  # percentile 策略参数
      # min_bucket_size: 5000                     # equal_count 策略参数


  # ================================================================
  # 步骤03：调用 Data-Juicer 清洗每个桶
  # 根据桶名匹配不同的清洗配置文件，支持并行清洗
  # ================================================================
  03_clean:
    enabled: false                # 是否启用
    max_workers: 4                # 并行进程数（覆盖全局配置）

    tag: "default"                # 清洗任务标签（用于 run_id）
    bucketed_root: "{task_dir}/bucketed"       # 分桶输入目录
    cleaned_root: "{task_dir}/cleaned_jsonl"   # 清洗输出根目录
    trace_root: "{task_dir}/trace_output"      # Data-Juicer trace 目录
    configs_dir: "configs/configs_qa"          # 清洗配置目录（相对于项目根）

    # 桶名到配置文件的映射（正则匹配，按顺序匹配）
    bucket_config_map:
      - pattern: "bucket_21_plus"         # 匹配长对话桶
        config: "config_bucket_10plus.yaml"
      - pattern: ".*"                     # 默认匹配所有未匹配的桶
        config: "overal_config.yaml"

    # 清洗后自动触发的分析器（在 reporting 启用时生效）
    attach_analyzers:
      - "RetentionAnalyzer"               # 保留率分析器
      - "TurnDistributionAnalyzer"        # 轮次分布分析器


  # ================================================================
  # 步骤04：应用清洗结果，生成最终训练数据
  # 根据清洗结果标记 loss=True/False
  # ================================================================
  04_finalize:
    enabled: false                # 是否启用
    source_run_id: null           # 指定清洗 run_id，留空自动取最新
    original_json: null           # 原始对话文件（与 01 输入一致），必填
    cleaned_root: "{task_dir}/cleaned_jsonl"       # 清洗结果根目录
    output_root: "{task_dir}/final_training_data"  # 最终训练数据输出根目录


  # ================================================================
  # 步骤05：语义增强（核心步骤）
  # 支持多种增强操作，可配置权重和参数
  # ================================================================
  05_augment:
    enabled: false                # 是否启用

    # ----- 并行配置 -----
    max_workers: 4                # 并行进程数（覆盖全局配置）

    # ----- 输入输出 -----
    input_file: null              # 输入文件路径（优先级最高，直接指定文件）
    input_dir: null               # 输入目录（优先级次高，自动取目录下最新 JSON 文件）
    source_run_id: null           # 指定最终数据 run_id（优先级低，按 run_id 匹配）
    tag: "augment"                # 增强任务标签（用于 run_id）
    output_dir: "{task_dir}/output_augmented_data"  # 增强输出根目录

    # ----- 变体生成 -----
    num_variants: 3               # 每个原始对话生成变体数
    adaptive_variants: true       # 是否根据可增强轮次自动调整变体数
    adaptive_max_variants: 3      # adaptive_variants=True 时，变体数上限（默认3）
    seed: 42                      # 随机种子（保证可复现）

    # ----- 目标选择 -----
    target_roles: ["user"]        # 要增强的角色：["user"] | ["assistant"] | ["user", "assistant"]
    only_loss_true: false         # 是否只增强 loss=True 的消息
    message_augment_prob: 1.0     # 每条消息被增强的概率（0~1）

    # ----- 组合策略 -----
    strategy: "single"            # 组合策略：single（单次）| multi_step（多步叠加）
    min_steps: 1                  # 多步策略：最少增强步数
    max_steps: 2                  # 多步策略：最多增强步数
    single_retry: 3               # 单次策略：重试次数（未产生变化时）
    multi_retry: 2                # 多步策略：重试次数

    # ----- 启用类别限制（可选）-----
    # 若指定，仅启用列出的类别，其他类别不会加载
    # enabled_categories: ["lexical", "order"]  # 不启用 model 类可避免加载 SentenceTransformer

    # ----- 增强器配置（新格式，推荐）-----
    # weight: 控制增强器被选中的概率（相对权重，数值越大被选中概率越高）
    # prob:   控制词级别操作概率（仅以下增强器支持：homophone, synonym_replace,
    #         random_delete, random_entity_replace, asr_noise）
    augmenters:
      # ========== 词法替换类（lexical）==========
      insert_filler:              # 插入语气词（如"嗯"、"那个"）
        enabled: true
        weight: 1.0
        fillers: ["嗯", "那个", "就是", "呃", "啊", "这个", "其实"]

      stutter:                    # 结巴模拟（重复首字）
        enabled: false
        weight: 1.0
        repeat_max: 2             # 最大重复次数

      homophone:                  # 同音字替换
        enabled: false
        weight: 1.0
        prob: 0.2                 # 替换概率
        dict_path: "resources/Homophone_tab.txt"

      synonym_replace:            # 同义词替换
        enabled: false
        weight: 1.0
        prob: 0.3                 # 替换概率
        dict_path: "resources/synonyms.txt"

      random_delete:              # 随机删除字符
        enabled: false
        weight: 1.0
        prob: 0.1                 # 删除概率

      random_entity_replace:      # 随机实体替换（银行、公司名等）
        enabled: false
        weight: 1.0
        prob: 0.2                 # 替换概率
        dict_path: "resources/bank.txt"

      word_repetition:            # 词语重复
        enabled: false
        weight: 2.0

      # ========== 语序重排类（order）==========
      reorder:                    # 语序打乱
        enabled: false
        weight: 1.0

      # ========== 模型类（model）==========
      asr_noise:                  # ASR 噪声增强（模拟语音识别错误）
        enabled: false
        weight: 5.0
        prob: 0.5                 # 每个候选位置的操作概率
        alpha: 0.7                # 拼音相似度权重（1-alpha 为语义相似度权重）
        max_operations: 2         # 单次增强最多修改位置数
        insert_prob: 0.2          # 插入操作概率（否则为替换）
        retry_times: 3            # 重试次数
        # ASR 模型/缓存路径（请根据实际文件位置修改）
        vectors_path: "resources/prev_clean/sample_20/qwen/prev_clean_prev_window_1_no_prob/abnormal_vectors.pkl"
        pinyin_path: "resources/prev_clean/sample_20/qwen/prev_clean_prev_window_1_no_prob/abnormal_pinyin.pkl"
        prev_map_path: "resources/prev_clean/sample_20/qwen/prev_clean_prev_window_1_no_prob/prev_to_abnormals.pkl"
        model_path: "Models/paraphrase-multilingual-MiniLM-L12-v2"

    # ----- 旧格式增强权重（已废弃，保留兼容）-----
    # augment_weights:
    #   insert_filler: 1
    #   stutter: 1
    #   reorder: 1
    #   homophone: 0
    #   random_delete: 1
    #   random_entity_replace: 1
    #   similarword: 0
    #   word_repetition: 2
    #   asr_noise: 5.0

    # ----- ASR 噪声增强缓存文件（旧格式，保留兼容）-----
    # asr_cache:
    #   vectors_path: "resources/prev_clean/sample_20/qwen/prev_clean_prev_window_1_no_prob/abnormal_vectors.pkl"
    #   pinyin_path: "resources/prev_clean/sample_20/qwen/prev_clean_prev_window_1_no_prob/abnormal_pinyin.pkl"
    #   prev_map_path: "resources/prev_clean/sample_20/qwen/prev_clean_prev_window_1_no_prob/prev_to_abnormals.pkl"
    #   model_path: "Models/paraphrase-multilingual-MiniLM-L12-v2"


  # ================================================================
  # 步骤06：文本替换 + loss 类型转换
  # 后处理：替换特定文本（如"洋钱罐"→"华夏银行"），并统一 loss 类型为字符串
  # ================================================================
  06_replace_text:
    enabled: false                # 是否启用
    input_file: null              # 输入文件，留空自动查找最新增强结果
    output_file: null             # 输出路径，自动生成
    suffix: "_replaced"           # 输出文件名后缀