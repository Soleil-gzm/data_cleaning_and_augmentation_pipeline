task_name: "test_augment_timestamp"

global:
  max_workers: 1

paths:
  input:
    raw_dialogues_dir: null
    prompt_dir: null
  task_root: "output"

steps_order:
  - "02_split_dialogues"
  - "03_bucket_by_turn"
  - "05_finalize_training"
  - "06_enrich_augment"

steps:
  02_split_dialogues:
    enabled: true
    input_json: datas/raw_data/0703/data-simulation-xiaoying-260703.json
    batch_size: 120000

  03_bucket_by_turn:
    enabled: true
    manual_buckets:
      - [0, 0]
      - [1, 2]

  05_finalize_training:
    enabled: true
    original_json: datas/raw_data/0703/data-simulation-xiaoying-260703.json

  06_enrich_augment:
    enabled: true
    max_workers: 1
    num_variants: 1
    seed: 42
    target_roles: ["user"]
    only_loss_true: false
    strategy: "single"
    
    augmenters:
      insert_filler:
        enabled: true
        weight: 1.0
