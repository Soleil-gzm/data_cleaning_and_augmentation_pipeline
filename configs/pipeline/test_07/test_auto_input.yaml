task_name: "test_auto_input"

# ------------------- 全局配置 -------------------
global:
  max_workers: 1

# ------------------- 路径管理 -------------------
paths:
  input:
    raw_dialogues_dir: null
    prompt_dir: null
  task_root: "output"

# ------------------- 步骤执行顺序 -------------------
steps_order:
  - "06_enrich_augment"

# ------------------- 各步骤详细配置 -------------------
steps:
  06_enrich_augment:
    enabled: true
    max_workers: 1
    num_variants: 1
    seed: 42
    target_roles: ["user"]
    only_loss_true: false
    strategy: "single"
    input_dir: "output/test_bucket_v2/05_finalize_training"
    
    augmenters:
      insert_filler:
        enabled: true
        weight: 1.0
