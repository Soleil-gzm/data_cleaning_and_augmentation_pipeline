# pipeline_config.yaml
task_name: "task_92049"                     # 任务标识，用于隔离中间目录
data_source:
  raw_dialogues_dir: "intermediate/{task_name}/raw_dialogues.json"   # 原始对话.doc/.docx目录
  prompt_dir: "./data/cases_random"                    # system信息目录
  raw_json_output: "intermediate/raw_dialogues.json"   # 可包含{task_name}变量

processing:
  split:
    input_json: "intermediate/raw_dialogues.json"
    output_samples_dir: "intermediate/{task_name}/samples"
    stats_dir:  "intermediate/{task_name}/stats"
    batch_size: 120000

  bucket:
    strategy: "auto"               # "auto" | "manual" | "percentile"
    # 自动策略参数（用于auto和percentile）
    auto_params:
      method: "percentile"         # "percentile" 或 "equal_count"
      percentiles: [0, 25, 50, 75, 90, 95, 100]  # 分位数
      min_bucket_size: 1000        # 每个桶最少样本数
    # 手动桶边界（当strategy="manual"时使用）
    manual_buckets:
      - [0, 0]
      - [1, 1]
      - [2, 2]
      - [3, 5]
      - [6, 10]
      - [11, 20]
      - [21, 999]

  cleaning:
    configs_dir: "configs/configs_qa"
    bucket_config_map:
      # 桶名匹配规则（支持通配符或正则）
      default: "overal_config.yaml"     # 未匹配的桶使用默认配置
      bucket_0: "config_bucket_0.yaml"
      bucket_1: "config_bucket_1.yaml"
      bucket_10plus: "config_bucket_10plus.yaml"
      # 也可以按区间或正则映射，这里简单用精确桶名

  finalize:
    original_json: "intermediate/raw_dialogues.json"
    cleaned_root: "intermediate/output_cleaning/cleaned_jsonl"
    output_final_dir: "intermediate/output_cleaning/final_training_data"

  augment:
    enable: true
    num_variants: 3
    min_turns: 1
    max_turns: 2
    target_roles: ["user"]
    only_loss_true: false
    adaptive_variants: false
    seed: 42

output:
  root_dir: "intermediate"          # 所有中间输出根目录
  logs_dir: "intermediate/logs"
  final_run_output: "output_augmented_data"   # 增强最终输出