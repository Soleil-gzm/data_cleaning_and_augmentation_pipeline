task_name: "task_4809"
run_id: "20260429_001"               # 可选，不填则自动生成时间戳
resume: true                         # 是否启用断点续跑

paths:
  input:
    raw_dialogues_dir: "./datas/Yangqg_simulation_data"
    prompt_dir: "./datas/cases_random"
  output:
    base_dir: "./intermediate"       # 所有中间文件均放在该目录下，自动加任务名
    final_output_dir: "./output_augmented_data"

steps:
  00_generate_raw:
    enabled: true
    script: "scripts/00_dataset_process.py"
  01_split:
    enabled: true
    script: "scripts/01_split_dialogues.py"
    batch_size: 120000
  02_bucket:
    enabled: true
    script: "scripts/02_split_into_buckets.py"
    strategy: "auto"                 # auto / manual / percentile
    auto_params:
      method: "percentile"
      percentiles: [0, 25, 50, 75, 90, 95, 100]
      min_bucket_size: 1000
    manual_buckets: []               # 手动时填写，如 [[0,0],[1,2]]
  03_clean:
    enabled: true
    script: "scripts/03_clean_buckets_with_plots.py"
    configs_dir: "configs/configs_qa"
    bucket_config_map:
      - pattern: "bucket_[0-2]"      # 正则表达式
        config: "overal_config.yaml"
      - pattern: "bucket_3"
        config: "config_bucket_3.yaml"
      - pattern: "bucket_10plus"
        config: "config_bucket_10plus.yaml"
      - pattern: ".*"                # 默认匹配
        config: "overal_config.yaml"
  04_finalize:
    enabled: true
    script: "scripts/04_apply_cleaned_loss_direct.py"
  05_augment:
    enabled: true
    script: "scripts/05_main_augment_add.py"
    num_variants: 3
    target_roles: ["user"]

logging:
  level: "INFO"                      # 控制台日志级别
  file_level: "DEBUG"                # 文件日志级别